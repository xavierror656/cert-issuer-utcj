services:
  postgres:
    image: postgres:16-alpine
    container_name: utcj-postgres
    restart: always
    environment:
      POSTGRES_DB: utcj_certs
      POSTGRES_USER: utcj_admin
      POSTGRES_PASSWORD: utcj_secure_db_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  utcj-microcredentials:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utcj-api
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://utcj_admin:utcj_secure_db_pass_2026@postgres:5432/utcj_certs
    ports:
      - "8000:8000"
    volumes:
      - ./data/utcj_microcredentials:/app/data/utcj_microcredentials
      - ./assets:/app/assets
      - ./examples:/app/examples
      - /home/ubuntu/secrets:/home/ubuntu/secrets:ro

volumes:
  pgdata:
